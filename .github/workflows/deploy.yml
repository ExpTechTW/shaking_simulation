name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允許此工作流程對 Pages 部署與 OIDC 驗證所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只允許一個部署；新推送不取消進行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # 快取 ~/.npm（相依套件下載）

      - name: Install dependencies
        run: npm ci

      # 快取建置產物：Vite 依賴預打包 + TypeScript 增量建置資訊
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            node_modules/.tmp
          key: build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'index.html', 'vite.config.ts', 'tsconfig*.json') }}
          restore-keys: |
            build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            build-cache-${{ runner.os }}-

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
